<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Task Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="page-header">
    <div class="header-top">
      <h1>My Task Board</h1>
      <span id="taskCount" class="task-count">0 Tasks</span>
    </div>

    <div class="filter-area">
      <label for="filterPriority">Filter by Priority:</label>
      <select id="filterPriority">
        <option value="all">All</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
  </header>

  <main class="board">

    <section id="todo" class="column">
      <div class="column-header">
        <h2>To Do</h2>
        <button type="button" class="add-task-btn" data-column="todo">Add Task</button>
      </div>
      <ul id="todoList" class="task-list"></ul>
    </section>

    <section id="inprogress" class="column">
      <div class="column-header">
        <h2>In Progress</h2>
        <button type="button" class="add-task-btn" data-column="inprogress">Add Task</button>
      </div>
      <ul id="inprogressList" class="task-list"></ul>
    </section>

    <section id="done" class="column">
      <div class="column-header">
        <h2>Done</h2>
        <div class="done-actions">
          <button type="button" class="add-task-btn" data-column="done">Add Task</button>
          <button type="button" id="clearDoneBtn">Clear All</button>
        </div>
      </div>
      <ul id="doneList" class="task-list"></ul>
    </section>

  </main>

  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Add New Task</h2>

      <input type="hidden" id="editingTaskId">
      <input type="hidden" id="currentColumn">

      <div class="form-group">
        <label for="taskTitle">Title</label>
        <input type="text" id="taskTitle" placeholder="Enter task title">
      </div>

      <div class="form-group">
        <label for="taskDescription">Description</label>
        <textarea id="taskDescription" rows="4" placeholder="Enter task description"></textarea>
      </div>

      <div class="form-group">
        <label for="taskPriority">Priority</label>
        <select id="taskPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <div class="form-group">
        <label for="taskDueDate">Due Date</label>
        <input type="date" id="taskDueDate">
      </div>

      <div class="modal-buttons">
        <button type="button" id="saveTaskBtn">Save</button>
        <button type="button" id="cancelTaskBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="taskmanager.js"></script>
</body>
</html>
